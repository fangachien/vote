<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>聚餐日期投票</title>
<style>
  :root{
    --blue:#0071e3; --blue-dark:#0077ed;
    --ink:#1d1d1f; --muted:#6e6e73; --line:#e8e8ed;
    --card:#fff; --chip:#f5f5f7;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(180deg,#fbfbfd 0%,#f5f5f7 100%);
    color:var(--ink); -webkit-font-smoothing:antialiased;
    padding:32px 16px 56px;
  }
  .wrap{ max-width:540px; margin:0 auto; }
  .head{ text-align:center; margin-bottom:28px; }
  .title{ font-size:30px; font-weight:600; letter-spacing:-.02em; margin:0; }
  .sub{ font-size:16px; color:var(--muted); margin:8px 0 0; line-height:1.45; }
  .card{ background:var(--card); border-radius:22px; padding:22px;
    box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 30px rgba(0,0,0,.05); margin-bottom:18px; }
  .label{ font-size:13px; font-weight:600; color:var(--muted); margin:0 0 8px; }
  .input{ width:100%; border:none; outline:none; background:var(--chip);
    border-radius:13px; padding:13px 15px; font-size:17px; color:var(--ink); transition:box-shadow .15s; }
  .input:focus{ box-shadow:0 0 0 4px rgba(0,113,227,.18); }
  .input::placeholder{ color:#a1a1a6; }

  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .month{ font-size:18px; font-weight:600; letter-spacing:-.01em; }
  .nav{ width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
    background:var(--chip); color:var(--ink); font-size:17px;
    display:flex; align-items:center; justify-content:center; transition:background .15s,opacity .15s; }
  .nav:hover:not(:disabled){ background:#ececf0; }
  .nav:disabled{ opacity:.3; cursor:default; }

  .grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .wd{ text-align:center; font-size:12px; font-weight:600; color:var(--muted); padding:6px 0; }
  .cell{ aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; }
  .day{ position:relative; width:90%; aspect-ratio:1/1; border:none; border-radius:50%;
    background:transparent; cursor:pointer; font-size:16px; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    transition:background .15s,color .15s,transform .12s; }
  .day:hover:not(:disabled){ background:#ececf0; }
  .day:active:not(:disabled){ transform:scale(.92); }
  .day.sel{ background:var(--blue); color:#fff; font-weight:600; }
  .day.sel:hover{ background:var(--blue-dark); }
  .day.today:not(.sel){ color:var(--blue); font-weight:600; }
  .day:disabled{ color:#c7c7cc; cursor:default; }
  .badge{ position:absolute; top:-1px; right:-1px; min-width:16px; height:16px; padding:0 3px;
    border-radius:8px; background:#ff9f0a; color:#fff; font-size:10px; font-weight:700;
    line-height:16px; text-align:center; }
  .day.sel .badge{ background:#fff; color:var(--blue); }

  .foot{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:18px; }
  .count{ font-size:14px; color:var(--muted); }
  .count b{ color:var(--ink); }
  .btn{ border:none; cursor:pointer; background:var(--blue); color:#fff; font-size:16px;
    font-weight:500; padding:12px 22px; border-radius:980px; font-family:inherit;
    transition:background .15s,transform .12s,opacity .15s; }
  .btn:hover:not(:disabled){ background:var(--blue-dark); }
  .btn:active:not(:disabled){ transform:scale(.97); }
  .btn:disabled{ opacity:.5; cursor:default; }
  .btn.saved{ background:#34c759; }
  .hint{ font-size:13px; color:#ff453a; margin:10px 0 0; line-height:1.5; word-break:break-word; }
  .hint.info{ color:var(--muted); }

  .res-head{ display:flex; align-items:baseline; justify-content:space-between; margin:2px 0 16px; }
  .res-title{ font-size:18px; font-weight:600; }
  .live{ font-size:12px; color:#34c759; font-weight:600; }
  .row{ margin-bottom:14px; }
  .row:last-child{ margin-bottom:0; }
  .row-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .date{ font-size:15px; font-weight:600; }
  .date .wkd{ color:var(--muted); font-weight:400; margin-left:6px; font-size:13px; }
  .win{ font-size:11px; font-weight:700; color:var(--blue); background:rgba(0,113,227,.1);
    padding:2px 8px; border-radius:8px; margin-left:8px; }
  .num{ font-size:14px; color:var(--muted); }
  .num b{ color:var(--ink); }
  .track{ height:8px; background:#f0f0f2; border-radius:4px; overflow:hidden; }
  .fill{ height:100%; border-radius:4px; background:linear-gradient(90deg,#0a84ff,#0071e3); transition:width .4s; }
  .fill.winbar{ background:linear-gradient(90deg,#30d158,#34c759); }
  .names{ font-size:12px; color:var(--muted); margin-top:5px; line-height:1.4; }
  .empty{ text-align:center; color:var(--muted); font-size:15px; padding:18px 0; }
  @media (prefers-reduced-motion:reduce){ *{ transition:none!important; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="head">
    <h1 class="title">聚餐日期投票</h1>
    <p class="sub">選出你方便的日子，看看哪天大家最能到。</p>
  </header>

  <div class="card">
    <p class="label">你的名字</p>
    <input id="name" class="input" placeholder="輸入名字" />
  </div>

  <div class="card">
    <p class="label">點選你方便的日期（可多選）</p>
    <div class="cal-head">
      <button id="prev" class="nav" aria-label="上個月">‹</button>
      <span id="month" class="month"></span>
      <button id="next" class="nav" aria-label="下個月">›</button>
    </div>
    <div id="grid" class="grid"></div>
    <div class="foot">
      <span class="count">已選 <b id="selcount">0</b> 天</span>
      <button id="save" class="btn">送出我的選擇</button>
    </div>
    <p id="hint" class="hint"></p>
  </div>

  <div class="card">
    <div class="res-head">
      <span id="restitle" class="res-title">目前統計</span>
      <span id="live" class="live"></span>
    </div>
    <div id="results"></div>
  </div>
</div>

<!-- 守門員：若模組（Firebase CDN）載入失敗，6 秒後提示 -->
<script>
  window.__appReady = false;
  setTimeout(function(){
    if(!window.__appReady){
      var h = document.getElementById("hint");
      if(h){
        h.className = "hint";
        h.textContent = "頁面載入失敗：可能無法連到 Firebase 的 CDN（www.gstatic.com）。若你在公司網路測試，請改用一般網路或手機。";
      }
    }
  }, 6000);
</script>

<script type="module">
/* ============================================================
   ① 把你的 Firebase 設定貼在這裡（從 Firebase 主控台複製）
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCu0knrHrfKgVZ27Ex66lA7FoEUykpyw54",
  authDomain: "vote-b237d.firebaseapp.com",
  projectId: "vote-b237d",
  storageBucket: "vote-b237d.firebasestorage.app",
  messagingSenderId: "29504862445",
  appId: "1:29504862445:web:c21255e925fb7a9f1eb4e4",
  measurementId: "G-Z3GJ2PN0LR"
};
/* ============================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const WEEKDAYS = ["日","一","二","三","四","五","六"];
const pad = n => String(n).padStart(2,"0");
const dateKey = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
function fmtDate(dk){
  const [y,m,d] = dk.split("-").map(Number);
  const wd = WEEKDAYS[new Date(y,m-1,d).getDay()];
  return { main:`${m}月${d}日`, sub:`週${wd}` };
}

const today = new Date(); today.setHours(0,0,0,0);
const state = {
  name:"", selected:new Set(), votes:[],
  viewYear:today.getFullYear(), viewMonth:today.getMonth(),
  saved:false, loadedName:""
};
const $ = id => document.getElementById(id);

function setHint(msg, info){
  const h = $("hint");
  h.textContent = msg || "";
  h.className = "hint" + (info ? " info" : "");
}

function maybeLoadExisting(){
  const t = state.name.trim().toLowerCase();
  if(!t || t === state.loadedName) return;
  const ex = state.votes.find(v => (v.name||"").trim().toLowerCase() === t);
  if(ex){
    state.selected = new Set(ex.dates || []);
    state.loadedName = t; state.saved = false;
    setHint("已載入你先前的選擇，可以直接修改", true);
    renderCalendar();
  }
}

function tally(){
  const t = {};
  state.votes.forEach(v => (v.dates||[]).forEach(d => { (t[d]=t[d]||[]).push(v.name); }));
  return t;
}

function renderCalendar(){
  const { viewYear:y, viewMonth:m } = state;
  $("month").textContent = `${y} 年 ${m+1} 月`;
  $("prev").disabled = (y===today.getFullYear() && m===today.getMonth());

  const t = tally();
  const firstWd = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const grid = $("grid");
  grid.innerHTML = "";

  WEEKDAYS.forEach(w => {
    const el = document.createElement("div");
    el.className = "wd"; el.textContent = w; grid.appendChild(el);
  });
  for(let i=0;i<firstWd;i++){
    const c = document.createElement("div"); c.className="cell"; grid.appendChild(c);
  }
  for(let d=1; d<=days; d++){
    const dk = dateKey(y,m,d);
    const cellDate = new Date(y,m,d);
    const isPast = cellDate < today;
    const isToday = cellDate.getTime() === today.getTime();
    const isSel = state.selected.has(dk);
    const others = (t[dk]||[]).length;

    const cell = document.createElement("div"); cell.className="cell";
    const btn = document.createElement("button");
    btn.className = "day" + (isSel?" sel":"") + (isToday?" today":"");
    btn.disabled = isPast;
    btn.textContent = d;
    if(others > 0){
      const b = document.createElement("span"); b.className="badge"; b.textContent=others;
      btn.appendChild(b);
    }
    btn.onclick = () => {
      if(state.selected.has(dk)) state.selected.delete(dk);
      else state.selected.add(dk);
      state.saved = false; setHint("");
      $("selcount").textContent = state.selected.size;
      updateSaveBtn();
      renderCalendar();
    };
    cell.appendChild(btn); grid.appendChild(cell);
  }
  $("selcount").textContent = state.selected.size;
}

function renderResults(){
  const t = tally();
  const rows = Object.entries(t)
    .map(([date,names]) => ({date,names,count:names.length}))
    .sort((a,b) => b.count-a.count || a.date.localeCompare(b.date));
  const max = rows.length ? rows[0].count : 0;
  const total = state.votes.length;
  $("restitle").textContent = "目前統計" + (total>0 ? `（${total} 人已投）` : "");

  const box = $("results");
  if(rows.length === 0){
    box.innerHTML = '<p class="empty">還沒有人投票，當第一個吧 🍽️</p>';
    return;
  }
  box.innerHTML = "";
  rows.forEach(r => {
    const f = fmtDate(r.date);
    const isWin = r.count === max;
    const pct = max ? (r.count/max)*100 : 0;
    const row = document.createElement("div"); row.className="row";
    row.innerHTML =
      `<div class="row-top">
        <span class="date">${f.main}<span class="wkd">${f.sub}</span>${isWin?'<span class="win">最多人</span>':''}</span>
        <span class="num"><b>${r.count}</b> 人</span>
      </div>
      <div class="track"><div class="fill${isWin?' winbar':''}" style="width:${pct}%"></div></div>
      <div class="names"></div>`;
    row.querySelector(".names").textContent = r.names.join("、");
    box.appendChild(row);
  });
}

function updateSaveBtn(){
  const btn = $("save");
  btn.className = "btn" + (state.saved ? " saved" : "");
  btn.textContent = state.saved ? "已送出 ✓" : "送出我的選擇";
}

// ---- Firebase ----
const configMissing =
  !firebaseConfig.apiKey ||
  /YOUR_|PASTE_|xxxx/i.test(firebaseConfig.apiKey) ||
  !firebaseConfig.projectId ||
  /YOUR_/i.test(firebaseConfig.projectId);

let db = null;

function listenVotes(){
  onSnapshot(
    collection(db, "votes"),
    (snap) => {
      const all = [];
      snap.forEach(d => { const v = d.data(); if(v && v.name) all.push(v); });
      state.votes = all;
      $("live").textContent = "● 即時";
      renderCalendar();
      renderResults();
    },
    (err) => {
      setHint("無法讀取資料：" + err.message + "（常見原因：Firestore 安全規則未開放，請見下方說明）", false);
    }
  );
}

async function save(){
  const name = state.name.trim();
  if(!name){ setHint("先填上你的名字吧", false); return; }
  if(state.selected.size === 0){ setHint("至少選一個你方便的日期", false); return; }
  if(configMissing || !db){
    setHint("⚠ 尚未填入 Firebase 設定，投票無法儲存。請依下方步驟把 firebaseConfig 貼到檔案上方。", false);
    return;
  }
  const btn = $("save"); btn.disabled = true; btn.textContent = "送出中…";
  try{
    let id = name.toLowerCase().replace(/\//g, "_").trim();
    if(id === "" || id === "." || id === "..") id = "user_" + Date.now();
    await setDoc(doc(db, "votes", id), {
      name,
      dates: [...state.selected].sort(),
      updatedAt: Date.now()
    });
    state.loadedName = name.toLowerCase();
    state.saved = true; setHint("");
    // onSnapshot 會自動更新統計
  }catch(e){
    setHint("送出失敗：" + e.message + "（常見原因：Firestore 安全規則未開放寫入）", false);
  }finally{
    btn.disabled = false; updateSaveBtn();
  }
}

// ---- wire up UI ----
$("prev").onclick = () => {
  if($("prev").disabled) return;
  if(state.viewMonth===0){ state.viewYear--; state.viewMonth=11; }
  else state.viewMonth--;
  renderCalendar();
};
$("next").onclick = () => {
  if(state.viewMonth===11){ state.viewYear++; state.viewMonth=0; }
  else state.viewMonth++;
  renderCalendar();
};
$("name").addEventListener("input", e => { state.name = e.target.value; });
$("name").addEventListener("blur", maybeLoadExisting);
$("save").onclick = save;

renderCalendar();
renderResults();
window.__appReady = true; // 通知守門員：模組已成功載入

if(configMissing){
  setHint("⚠ 尚未填入 Firebase 設定。請依下方步驟建立 Firebase 專案，把 firebaseConfig 貼到本檔上方標示處，投票才會運作。", false);
}else{
  try{
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    listenVotes();
  }catch(e){
    setHint("Firebase 初始化失敗：" + e.message, false);
  }
}
</script>
</body>
</html>
